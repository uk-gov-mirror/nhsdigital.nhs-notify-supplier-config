      payload:
        $ref: './events/letter-variant.draft.schema.json'

    letter-variant-int:
      name: letter-variant-int
      title: Letter Variant Status INT
      summary: |
        A letter variant configuration has been changed to INT status.

        This indicates that a letter variant configuration is active in the integration environment.
