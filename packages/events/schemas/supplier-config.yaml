---
asyncapi: '3.0.0'
info:
  title: NHS Notify Supplier Config Events
  version: 1.x
  description: Events generated by the supplier-config bounded context
defaultContentType: application/json

channels:
  control-plane:
    title: Control Plane
    description: Events relating to supplier configuration changes
    messages:
      supplier-draft:
        $ref: '#/components/messages/supplier-draft'
      supplier-int:
        $ref: '#/components/messages/supplier-int'
      supplier-prod:
        $ref: '#/components/messages/supplier-prod'
      supplier-disabled:
        $ref: '#/components/messages/supplier-disabled'
      supplier-published:
        $ref: '#/components/messages/supplier-published'
      supplier-any:
        $ref: '#/components/messages/supplier-any'
      letter-variant-draft:
        $ref: '#/components/messages/letter-variant-draft'
      letter-variant-int:
        $ref: '#/components/messages/letter-variant-int'
      letter-variant-prod:
        $ref: '#/components/messages/letter-variant-prod'
      letter-variant-disabled:
        $ref: '#/components/messages/letter-variant-disabled'
      letter-variant-any:
        $ref: '#/components/messages/letter-variant-any'
      pack-specification-draft:
        $ref: '#/components/messages/pack-specification-draft'
      pack-specification-int:
        $ref: '#/components/messages/pack-specification-int'
      pack-specification-prod:
        $ref: '#/components/messages/pack-specification-prod'
      pack-specification-disabled:
        $ref: '#/components/messages/pack-specification-disabled'
      pack-specification-any:
        $ref: '#/components/messages/pack-specification-any'
      supplier-allocation-draft:
        $ref: '#/components/messages/supplier-allocation-draft'
      supplier-allocation-int:
        $ref: '#/components/messages/supplier-allocation-int'
      supplier-allocation-prod:
        $ref: '#/components/messages/supplier-allocation-prod'
      supplier-allocation-disabled:
        $ref: '#/components/messages/supplier-allocation-disabled'
      supplier-allocation-any:
        $ref: '#/components/messages/supplier-allocation-any'
      supplier-pack-draft:
        $ref: '#/components/messages/supplier-pack-draft'
      supplier-pack-int:
        $ref: '#/components/messages/supplier-pack-int'
      supplier-pack-prod:
        $ref: '#/components/messages/supplier-pack-prod'
      supplier-pack-disabled:
        $ref: '#/components/messages/supplier-pack-disabled'
      supplier-pack-any:
        $ref: '#/components/messages/supplier-pack-any'
      volume-group-draft:
        $ref: '#/components/messages/volume-group-draft'
      volume-group-int:
        $ref: '#/components/messages/volume-group-int'
      volume-group-prod:
        $ref: '#/components/messages/volume-group-prod'
      volume-group-disabled:
        $ref: '#/components/messages/volume-group-disabled'
      volume-group-published:
        $ref: '#/components/messages/volume-group-published'
      volume-group-any:
        $ref: '#/components/messages/volume-group-any'

components:
  messages:
    # Supplier events
    supplier-draft:
      name: supplier-draft
      title: Supplier Status Draft
      summary: |
        A supplier configuration has been changed to DRAFT status.

        This indicates that a supplier configuration is in draft state and not yet active in any environment.
      contentType: application/json
      payload:
        $ref: './events/supplier.draft.schema.json'

    supplier-int:
      name: supplier-int
      title: Supplier Status INT
      summary: |
        A supplier configuration has been changed to INT status.

        This indicates that a supplier configuration is active in the integration environment.
      contentType: application/json
      payload:
        $ref: './events/supplier.int.schema.json'

    supplier-prod:
      name: supplier-prod
      title: Supplier Status PROD
      summary: |
        A supplier configuration has been changed to PROD status.

        This indicates that a supplier configuration is active in the production environment (and integration).
      contentType: application/json
      payload:
        $ref: './events/supplier.prod.schema.json'

    supplier-disabled:
      name: supplier-disabled
      title: Supplier Status Disabled
      summary: |
        A supplier configuration has been disabled.

        This indicates that a supplier configuration has been deactivated.
      contentType: application/json
      payload:
        $ref: './events/supplier.disabled.schema.json'

    supplier-published:
      name: supplier-published
      title: Supplier Published
      summary: |
        A supplier configuration has been published.

        This event is emitted when supplier configuration changes are published to downstream systems.
      contentType: application/json
      payload:
        $ref: './events/supplier.published.schema.json'

    supplier-any:
      name: supplier-any
      title: Supplier Status Changed
      summary: |
        A supplier status has been updated.

        This is a generic schema which matches any supplier status change.
      contentType: application/json
      payload:
        $ref: './events/supplier.any.schema.json'

    # Letter Variant events
    letter-variant-draft:
      name: letter-variant-draft
      title: Letter Variant Status Draft
      summary: |
        A letter variant configuration has been changed to DRAFT status.

        This indicates that a letter variant configuration is in draft state and not yet active in any environment.
