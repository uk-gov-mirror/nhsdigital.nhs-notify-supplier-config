      payload:
        $ref: './events/letter-variant.prod.schema.json'

    letter-variant-disabled:
      name: letter-variant-disabled
      title: Letter Variant Status Disabled
      summary: |
        A letter variant configuration has been disabled.

        This indicates that a letter variant configuration has been deactivated.
      contentType: application/json
      payload:
        $ref: './events/letter-variant.disabled.schema.json'

    letter-variant-any:
      name: letter-variant-any
      title: Letter Variant Status Changed
      summary: |
        A letter variant status has been updated.

        This is a generic schema which matches any letter variant status change.
      contentType: application/json
      payload:
        $ref: './events/letter-variant.any.schema.json'

    # Pack Specification events
