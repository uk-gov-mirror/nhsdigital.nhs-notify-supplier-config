      title: Pack Specification Status Draft
      summary: |
        A pack specification configuration has been changed to DRAFT status.

        This indicates that a pack specification is in draft state and not yet active in any environment.
      contentType: application/json
      payload:
        $ref: './events/pack-specification.draft.schema.json'

    pack-specification-int:
      name: pack-specification-int
      title: Pack Specification Status INT
      summary: |
        A pack specification configuration has been changed to INT status.

        This indicates that a pack specification is active in the integration environment.
      contentType: application/json
      payload:
        $ref: './events/pack-specification.int.schema.json'

    pack-specification-prod:
      name: pack-specification-prod
      title: Pack Specification Status PROD
      summary: |
        A pack specification configuration has been changed to PROD status.

        This indicates that a pack specification is active in the production environment (and integration).
      contentType: application/json
      payload:
        $ref: './events/pack-specification.prod.schema.json'

    pack-specification-disabled:
      name: pack-specification-disabled
      title: Pack Specification Status Disabled
      summary: |
        A pack specification configuration has been disabled.

        This indicates that a pack specification has been deactivated.
      contentType: application/json
      payload:
        $ref: './events/pack-specification.disabled.schema.json'

    pack-specification-any:
      name: pack-specification-any
      title: Pack Specification Status Changed
      summary: |
        A pack specification status has been updated.

        This is a generic schema which matches any pack specification status change.
      contentType: application/json
      payload:
        $ref: './events/pack-specification.any.schema.json'

    # Supplier Allocation events
