      summary: |
        A supplier allocation configuration has been changed to DRAFT status.

        This indicates that a supplier allocation is in draft state and not yet active in any environment.
      contentType: application/json
      payload:
        $ref: './events/supplier-allocation.draft.schema.json'

    supplier-allocation-int:
      name: supplier-allocation-int
      title: Supplier Allocation Status INT
      summary: |
        A supplier allocation configuration has been changed to INT status.

        This indicates that a supplier allocation is active in the integration environment.
      contentType: application/json
      payload:
        $ref: './events/supplier-allocation.int.schema.json'

    supplier-allocation-prod:
      name: supplier-allocation-prod
      title: Supplier Allocation Status PROD
      summary: |
        A supplier allocation configuration has been changed to PROD status.

        This indicates that a supplier allocation is active in the production environment (and integration).
      contentType: application/json
      payload:
        $ref: './events/supplier-allocation.prod.schema.json'

    supplier-allocation-disabled:
      name: supplier-allocation-disabled
      title: Supplier Allocation Status Disabled
      summary: |
        A supplier allocation configuration has been disabled.

        This indicates that a supplier allocation has been deactivated.
      contentType: application/json
      payload:
        $ref: './events/supplier-allocation.disabled.schema.json'

    supplier-allocation-any:
      name: supplier-allocation-any
      title: Supplier Allocation Status Changed
      summary: |
        A supplier allocation status has been updated.

        This is a generic schema which matches any supplier allocation status change.
      contentType: application/json
      payload:
        $ref: './events/supplier-allocation.any.schema.json'

    # Supplier Pack events
    supplier-pack-draft:
      name: supplier-pack-draft
      title: Supplier Pack Status Draft
      summary: |
        A supplier pack configuration has been changed to DRAFT status.

        This indicates that a supplier pack is in draft state and not yet active in any environment.
      contentType: application/json
      payload:
        $ref: './events/supplier-pack.draft.schema.json'

    supplier-pack-int:
      name: supplier-pack-int
      title: Supplier Pack Status INT
      summary: |
        A supplier pack configuration has been changed to INT status.

        This indicates that a supplier pack is active in the integration environment.
      contentType: application/json
      payload:
        $ref: './events/supplier-pack.int.schema.json'

    supplier-pack-prod:
      name: supplier-pack-prod
      title: Supplier Pack Status PROD
      summary: |
        A supplier pack configuration has been changed to PROD status.

